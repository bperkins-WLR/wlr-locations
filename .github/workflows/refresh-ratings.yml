name: Refresh Google ratings

on:
  schedule:
    - cron: '0 11 * * *'   # daily at 11:00 UTC (~6-7 AM Eastern)
  workflow_dispatch: {}     # allows manual "Run workflow" from the Actions tab

permissions:
  contents: write

concurrency:
  group: refresh-ratings
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Fetch ratings from Google Places API
        env:
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
        run: node tools/fetch-ratings.mjs

      - name: Commit ratings if changed
        run: |
          git config user.name  "wlr-ratings-bot"
          git config user.email "actions@users.noreply.github.com"
          git add "WLR Location Photos Webapp/ratings.json" tools/place-ids.json
          if git diff --staged --quiet; then
            echo "No rating changes."
          else
            git commit -m "Update Google ratings [skip ci]"
            git push
          fi
